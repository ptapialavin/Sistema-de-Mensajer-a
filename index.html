<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Sistema de Mensajería</title>
    <script
      src="https://kit.fontawesome.com/a5c81475b7.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
<!--Bara lateral de navegación--> 
    <aside class="sidebar">
        
        <div class="sidebar-header">
            <div class="user-profile">
                <img src="./assets/img/maria.jpg" alt="Maria" class="avatar">
                <div class="user-info">
                    <p class="name">Maria</p>
                    <p class="status">Activo ahora</p>
                </div>
            </div>
            <div class="header-iconos">
                <span><i class="fa-regular fa-comment"></i></span>
                <span><i class="fa-solid fa-bars"></i></span>
            </div>
        </div>

        <div class="accion-container">
            <button class="btn-new-chat">Nuevo Chat</button>
        </div>

        <div class="chat-list">
            
            <div class="chat-item">
                <img src="./assets/img/Screen Shot 2018-11-28 at 15.27.14.jpg" alt="Juanita" class="avatar">
                <div class="chat-details">
                    <span class="contact-name">Juanita</span>
                    <span class="texto-previo">En el trabajo</span>
                </div>
            </div>

            <div class="chat-item">
                <img src="./assets/img/Screen Shot 2018-11-28 at 15.28.04.jpg" alt="Alberto" class="avatar">
                <div class="chat-details">
                    <span class="contact-name">Alberto</span>
                    <span class="texto-previo">En Línea</span>
                </div>
            </div>

            <div class="chat-item">
                <img src="./assets/img/Screen Shot 2018-11-28 at 15.30.34.jpg" alt="Ignacio" class="avatar">
                <div class="chat-details">
                    <span class="contact-name">Ignacio</span>
                    <span class="texto-previo">De Vacaciones</span>
                </div>
            </div>

            <div class="chat-item">
                <img src="./assets/img/Screen Shot 2018-11-28 at 15.30.54.jpg" alt="Cristian" class="avatar">
                <div class="chat-details">
                    <span class="contact-name">Cristian</span>
                    <span class="texto-previo">Sólo temas Urgentes</span>
                </div>
            </div>

            <div class="chat-item">
                <img src="./assets/img/Screen Shot 2018-11-28 at 15.31.09.jpg" alt="María José" class="avatar">
                <div class="chat-details">
                    <span class="contact-name">Patricio</span>
                    <span class="texto-previo">En Línea</span>
                </div>
            </div>

            <div class="chat-item">
                <img src="./assets/img/Screen Shot 2018-11-28 at 15.32.16.jpg" alt="Gonzalo" class="avatar">
                <div class="chat-details">
                    <span class="contact-name">Gonzalo</span>
                    <span class="texto-previo">Fuera de la Oficina</span>
                </div>
            </div>

        </div>
<!--Segmento Principal o main--> 
    </aside>
    </main>
      <main class="contenido">
        <section class="contenedor-bienvenida">
          <div class="hero-icon">
            <span role="img" aria-label="networking"
              ><img src="./assets/img/hand.png" alt="foto_principal"
            /></span>
          </div>
          <h1 class="welcome-title">Comienza el Networking</h1>
          <p class="welcome-desc">
            Presiona el botón
            <span class="text-highlight">"Nuevo chat"</span> para comenzar a
            crear nuevas redes de contacto para tu empresa o emprendimiento.
          </p>
        </section>
      </main>
    </div>

  </body> 
</html>
